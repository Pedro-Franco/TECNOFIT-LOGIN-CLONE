<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Tecnofit</title>
</head>

<body>

    <div div="background">
        <div class="fundo">
            <div>
                <a href="#"><img class="fundo-imagem" src="https://s3.sa-east-1.amazonaws.com/tecnofit-login-images/00.png" alt="backgorund"></a>
            </div>
        </div>
    </div>

    <div id="container">
        <div class="form">
            <img class="tecnofit-logo" src="https://s3-sa-east-1.amazonaws.com/tecnofit-imagem/logo/logo-azul.png" alt="tecnofit-logo">
            <h4>Acesso ao Sistema</h4>
            <p>Digite seu e-mail e senha, e acesse agora mesmo o melhor e mais moderno sistema de gestão.</p>

            <div id="form-body">
                <div id="input-email">
                    <input class="email" type="text" name="email" placeholder="E-mail">
                </div>

                <div id="input-senha">
                    <input class="senha" type="password" name="senha" placeholder="Senha">
                </div>
            </div>

            <div id="form-btn">
                <a class="btn-esqueceu-senha" href="#">Esqueci minha senha</a>
                <a class="btn-entrar" href="#" type="submit">Acessar</a>
            </div>

            <footer id="form-midias">
                <div id="duvidas-div">
                    <span class="duvidas">Dúvidas? Entre em contato</span>
                </div>

                <div id="contatos-div">
                    <span class="contato-fone">(00) 90000-0000 <span class="contato-espaço"> | </span><span class="contato-email"> suporte@tecnofit.com</span></span>
                </div>
            </footer>
        </div>
    </div>

    
</body>

</html>
